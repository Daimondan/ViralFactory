version: 1

# Generic FFmpeg drawtext defaults. Tenant Visual Style modules may override
# individual values through YAML frontmatter under render_styles.overlay_styles.
# Style refs used by the Writer/cue compiler: default, hook, emphasis, highlight,
# title, caption, proof, reframe, cta, bold-prosperity-gold, deep-ocean-teal,
# split-screen-coral-divider.
overlay_styles:
  default:
    fontsize: 48
    fontcolor: white
    borderw: 3
    bordercolor: black
    shadowx: 1
    shadowy: 1
    shadowcolor: "black@0.5"
  hook:
    fontsize: 72
    fontcolor: white
    borderw: 4
    bordercolor: black
    shadowx: 2
    shadowy: 2
    shadowcolor: "black@0.5"
  emphasis:
    fontsize: 56
    fontcolor: white
    borderw: 3
    bordercolor: black
    shadowx: 1
    shadowy: 1
    shadowcolor: "black@0.5"
  highlight:
    fontsize: 56
    fontcolor: yellow
    borderw: 3
    bordercolor: black
  title:
    fontsize: 80
    fontcolor: white
    borderw: 5
    bordercolor: black
    shadowx: 3
    shadowy: 3
    shadowcolor: "black@0.6"
  caption:
    fontsize: 42
    fontcolor: white
    borderw: 2
    bordercolor: black
    shadowx: 1
    shadowy: 1
    shadowcolor: "black@0.5"
  proof:
    fontsize: 40
    fontcolor: white
    borderw: 2
    bordercolor: black
    shadowx: 1
    shadowy: 1
    shadowcolor: "black@0.5"
  reframe:
    fontsize: 56
    fontcolor: white
    borderw: 3
    bordercolor: black
    shadowx: 1
    shadowy: 1
    shadowcolor: "black@0.5"
  cta:
    fontsize: 52
    fontcolor: white
    borderw: 3
    bordercolor: black
    shadowx: 2
    shadowy: 2
    shadowcolor: "black@0.5"
  bold-prosperity-gold:
    fontsize: 64
    fontcolor: "#F2B705"
    borderw: 4
    bordercolor: black
    shadowx: 2
    shadowy: 2
    shadowcolor: "black@0.6"
  deep-ocean-teal:
    fontsize: 56
    fontcolor: "#0A4D5C"
    borderw: 3
    bordercolor: white
    shadowx: 1
    shadowy: 1
    shadowcolor: "white@0.5"
  split-screen-coral-divider:
    fontsize: 56
    fontcolor: "#E8654A"
    borderw: 3
    bordercolor: white
    shadowx: 1
    shadowy: 1
    shadowcolor: "white@0.5"

# Generic deterministic synthesis parameters. Tenant Visual Style modules may
# override individual presets. Effects are only rendered when the edit plan
# explicitly contains an SFX cue.
sfx_default_preset: pop
sfx_presets:
  whoosh:
    freq: "800"
    duration: 0.3
    volume: 0.4
    type: sine
  pop:
    freq: "1200"
    duration: 0.15
    volume: 0.5
    type: sine
  hit:
    freq: "60"
    duration: 0.2
    volume: 0.6
    type: sine
  riser:
    freq: "400"
    duration: 0.8
    volume: 0.3
    type: sine