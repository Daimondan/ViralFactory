# ViralFactory models config
# LLM backend configuration. Swap = config edit, zero code change.
# The drafter backend is chosen by blind A/B at the M3 checkpoint.

# Default backend for processing steps (temperature 0, deterministic)
default:
  provider: "ollama_cloud"         # ollama_local | ollama_cloud | openai | anthropic
  model: "qwen2.5:32b"
  temperature: 0
  max_tokens: 4096
  base_url: "https://ollama.com"   # Ollama Cloud API — set OLLAMA_API_KEY env var

# Drafter backend (for content drafting — may differ from processing)
drafter:
  provider: "ollama_cloud"
  model: "qwen2.5:32b"
  temperature: 0.7                 # some creativity for drafting
  max_tokens: 8192
  base_url: "https://ollama.com"

# A/B candidate for M3 checkpoint (leave null until checkpoint)
drafter_ab_candidate:
  provider: null                   # e.g. "openai"
  model: null                      # e.g. "gpt-4o"
  temperature: null
  max_tokens: null
  base_url: null