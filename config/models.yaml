# ViralFactory models config
# LLM backend configuration. Swap = config edit, zero code change.
#
# Users can define as many named backends as they want below.
# Each backend has: provider, model, temperature, max_tokens, base_url.
# Reference any backend by name in playbooks or code: adapter.complete(..., backend="glm_5_2")
#
# The active processing/drafting backends are set in the "active" block.
# The drafter backend is chosen by blind A/B at the M3 checkpoint.

# ── Active backend selection ──────────────────────────────────────────
# Change these to switch which named backend is used for processing vs drafting.
active:
  default: "ollama_glm52"       # processing steps (temperature 0)
  drafter: "ollama_glm52_creative"  # content drafting (generative — real temperature)
  ideator: "ollama_glm52_creative"  # idea generation (generative — real temperature)
  converse: "ollama_gpt_oss_120b"  # P2-1: fast non-reasoning backend for conversational turns
  drafter_ab_candidate: null    # set to a backend name for M3 A/B test

# ── Named backends ────────────────────────────────────────────────────
# Add as many as you need. provider drives the API format:
#   ollama_cloud / ollama_local → Ollama API (/api/chat)
#   openai                      → OpenAI-compatible (/v1/chat/completions)
# Set the matching env var for auth: OLLAMA_API_KEY, OPENAI_API_KEY, etc.

ollama_glm52:
  provider: "ollama_cloud"
  model: "glm-5.2"
  temperature: 0
  max_tokens: 8192              # GLM-5.2 is a reasoning model — needs headroom
  base_url: "https://ollama.com"

# Generative backend for idea generation + drafting (real temperature per
# CORRECTION-generation-diversity-and-asset-continuity S1a). The temp-0 guardrail
# correctly covers judgment/extraction only; generative calls need variance.
ollama_glm52_creative:
  provider: "ollama_cloud"
  model: "glm-5.2"
  temperature: 0.9
  max_tokens: 8192
  base_url: "https://ollama.com"

ollama_gpt_oss_120b:
  provider: "ollama_cloud"
  model: "gpt-oss:120b"
  temperature: 0
  max_tokens: 4096
  base_url: "https://ollama.com"

ollama_kimi_k26:
  provider: "ollama_cloud"
  model: "kimi-k2.6"
  temperature: 0
  max_tokens: 8192
  base_url: "https://ollama.com"

# Example: OpenAI-compatible backend (uncomment + set OPENAI_API_KEY env)
# openai_gpt4o:
#   provider: "openai"
#   model: "gpt-4o"
#   temperature: 0
#   max_tokens: 4096
#   base_url: "https://api.openai.com"

# ── Transcription (R6 fix per DIVERGENCE-003) ───────────────────────
# faster-whisper for speech-to-text. Runs on CPU (int8 quantization).
# Audio files uploaded during intake are transcribed automatically.
# Per DECISION-transcription-whisper-v1.0.md: medium model, CPU int8.
transcription:
  enabled: true
  model: "medium"          # tiny | base | small | medium | large-v3 (RAM scales)
  compute_type: "int8"   # CPU-only VPS; float16 if GPU available
  language: "en"         # "auto" for auto-detect

# ── Voice cloning (DIVERGENCE-003, DECISION-voice-cloning-vo-v1.0) ───
# Open-source TTS with zero-shot voice cloning. MIT licensed Chatterbox
# (commercially safe for paying customers). NOT XTTS-v2 (CPML = non-commercial).
# Reference audio stored per-business in modules/{business}/voice-samples/.
voice_cloning:
  # Engine selection: chatterbox (local, MIT, voice cloning) | gemini_tts (cloud, preset voices)
  engine: "chatterbox"
  reference_audio_dir: "modules/{business}/voice-samples/"
  sample_rate: 24000
  # Chatterbox config (DECISION-voice-cloning-vo-v1.0)
  chatterbox:
    model: "chatterbox_turbo_tts"        # chatterbox_tts (0.5B) | chatterbox_turbo_tts (350M, faster, better accent)
    device: "cpu"                      # cpu | cuda (if GPU available)
    exaggeration: 0.5                 # 0.0-2.0 (ignored by Turbo, kept for full model fallback)
    cfg_weight: 0.5                    # 0.0-1.0 (ignored by Turbo, kept for full model fallback)
    # Turbo ignores exaggeration/cfg_weight — uses its own internal voice matching.
    # Turbo gave better Bajan accent + deeper male voice in operator listening test.
    # Reference: PTT-20240310-WA0003.wav (41s, 67Hz F0 — deepest male clip)
    # Models auto-download from HuggingFace on first use (~2 GB total, cached)
    # On CPU-only VPS: Turbo RTF ~7-8x (faster than full model's ~10-13x).
  # Gemini TTS fallback (preset voices only, no cloning)
  tts:
    model: "gemini-3.1-flash-tts-preview"
    voice: "Kore"
    style: "warm, authoritative, Caribbean-influenced English"
    api_key_env: "GEMINI_API_KEY"
    sample_rate: 24000

# ── Media generation (F4: CORRECTION-pipeline-ux-and-media-generation-v1.0) ──
# Config-driven generator inventory. The LLM media plan prompt sees all
# configured generators and decides which to use per segment.
# Add new generators here — they automatically appear in the LLM's options.
#
# Auth: set the env var for each provider you want active.
# OPENROUTER_API_KEY routes to Gemini, Veo, and other OpenRouter models.
# XAI_API_KEY for Grok video.
# OPENAI_API_KEY for Sora/DALL-E.
# GOOGLE_API_KEY for Veo direct (if not via OpenRouter).
media:
  # ── Image generators ──
  image_default: "google/gemini-3.1-flash-image"
  image_base_url: "https://openrouter.ai/api/v1"

  # ── Video generators (list — LLM chooses) ──
  video_generators:
    - name: "grok-imagine-video"
      provider: "xai"
      model: "grok-imagine-video"
      base_url: "https://api.x.ai"
      api_key_env: "XAI_API_KEY"
      best_for: "stylized, conceptual, fast generation"
    - name: "veo"
      provider: "google"
      model: "veo-3.1-fast-generate-preview"
      base_url: "https://generativelanguage.googleapis.com"
      api_key_env: "GOOGLE_API_KEY"
      best_for: "cinematic, photorealistic, long clips"
    - name: "sora"
      provider: "openai"
      model: "sora"
      base_url: "https://api.openai.com"
      api_key_env: "OPENAI_API_KEY"
      best_for: "complex scenes, multi-subject, high quality"

  # ── Legacy single-generator config (kept for backward compat) ──
  video_default: "grok-imagine-video"
  video_provider: "xai"
  video_base_url: "https://api.x.ai"
  base_url: "https://openrouter.ai/api/v1"

  # ── Animation/3D (disabled by default — enable when installed) ──
  animation:
    enabled: false
    tool: "blender"
    best_for: "motion graphics, animated text, 3D sequences"

# ── Asset review (AI viewer) ──────────────────────────────────────────
# Vision-capable model for inspecting rendered videos and generated images.
# The model receives extracted keyframes + the asset content and judges
# whether the output is coherent before the operator reviews it.
# The review is advisory — the operator is always the final gate.
# Set enabled: false to skip AI review (mechanical checks still run).
asset_review:
  vision_model: "google/gemini-3.1-flash-lite"
  vision_provider: "openrouter"
  vision_api_key_env: "OPENROUTER_API_KEY"
  max_keyframes: 5
  enabled: true
  # T10.9 (AMENDMENT-008): Remediation cost guard
  # max_remediation_cost_usd: 2.00   # cumulative cap per asset (UNCOMMENT to enable auto-remediation)
  max_remediation_rounds: 3          # hard cap on render/review rounds

# ── Stock library (Final Assembly Part 1) ──
# Pexels (primary) + Pixabay (secondary). Both free, commercial-safe.
# Auth: PEXELS_API_KEY + PIXABAY_API_KEY env vars.
stock:
  providers:
    - "pexels"
    - "pixabay"
  music_source: "pixabay"      # Pixabay's audio catalog for background tracks
  cache_dir: "data/media/stock"

# ── Buffer (M4: publish + metrics) ──
