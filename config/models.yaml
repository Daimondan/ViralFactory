# ViralFactory models config
# LLM backend configuration. Swap = config edit, zero code change.
#
# Users can define as many named backends as they want below.
# Each backend has: provider, model, temperature, max_tokens, base_url.
# Reference any backend by name in playbooks or code: adapter.complete(..., backend="glm_5_2")
#
# The active processing/drafting backends are set in the "active" block.
# The drafter backend is chosen by blind A/B at the M3 checkpoint.

# ── Active backend selection ──────────────────────────────────────────
# Change these to switch which named backend is used for processing vs drafting.
active:
  default: "ollama_glm52"       # processing steps (temperature 0)
  drafter: "ollama_glm52_creative"  # content drafting (generative — real temperature)
  ideator: "ollama_glm52_creative"  # idea generation (generative — real temperature)
  converse: "ollama_gpt_oss_120b"  # P2-1: fast non-reasoning backend for conversational turns
  drafter_ab_candidate: null    # set to a backend name for M3 A/B test

# ── Named backends ────────────────────────────────────────────────────
# Add as many as you need. provider drives the API format:
#   ollama_cloud / ollama_local → Ollama API (/api/chat)
#   openai                      → OpenAI-compatible (/v1/chat/completions)
# Set the matching env var for auth: OLLAMA_API_KEY, OPENAI_API_KEY, etc.

ollama_glm52:
  provider: "ollama_cloud"
  model: "glm-5.2"
  temperature: 0
  max_tokens: 8192              # GLM-5.2 is a reasoning model — needs headroom
  base_url: "https://ollama.com"

# Generative backend for idea generation + drafting (real temperature per
# CORRECTION-generation-diversity-and-asset-continuity S1a). The temp-0 guardrail
# correctly covers judgment/extraction only; generative calls need variance.
ollama_glm52_creative:
  provider: "ollama_cloud"
  model: "glm-5.2"
  temperature: 0.9
  max_tokens: 8192
  base_url: "https://ollama.com"

ollama_gpt_oss_120b:
  provider: "ollama_cloud"
  model: "gpt-oss:120b"
  temperature: 0
  max_tokens: 4096
  base_url: "https://ollama.com"

ollama_kimi_k26:
  provider: "ollama_cloud"
  model: "kimi-k2.6"
  temperature: 0
  max_tokens: 8192
  base_url: "https://ollama.com"

# Example: OpenAI-compatible backend (uncomment + set OPENAI_API_KEY env)
# openai_gpt4o:
#   provider: "openai"
#   model: "gpt-4o"
#   temperature: 0
#   max_tokens: 4096
#   base_url: "https://api.openai.com"

# ── Transcription (R6 fix per DIVERGENCE-003) ───────────────────────
# faster-whisper for speech-to-text. Runs on CPU (int8 quantization).
# Audio files uploaded during intake are transcribed automatically.
# Per DECISION-transcription-whisper-v1.0.md: medium model, CPU int8.
transcription:
  enabled: true
  model: "medium"          # tiny | base | small | medium | large-v3 (RAM scales)
  compute_type: "int8"   # CPU-only VPS; float16 if GPU available
  language: "en"         # "auto" for auto-detect

# ── Voice cloning (DIVERGENCE-003, DECISION-voice-cloning-vo-v1.0) ───
# Open-source TTS with zero-shot voice cloning. MIT licensed Chatterbox
# (commercially safe for paying customers). NOT XTTS-v2 (CPML = non-commercial).
# Reference audio stored per-business in modules/{business}/voice-samples/.
voice_cloning:
  # Engine selection: chatterbox (local, MIT, voice cloning) | gemini_tts (cloud, preset voices)
  engine: "chatterbox"
  reference_audio_dir: "modules/{business}/voice-samples/"
  sample_rate: 24000
  # Chatterbox config (DECISION-voice-cloning-vo-v1.0)
  chatterbox:
    model: "chatterbox_turbo_tts"        # chatterbox_tts (0.5B) | chatterbox_turbo_tts (350M, faster, better accent)
    device: "cpu"                      # cpu | cuda (if GPU available)
    exaggeration: 0.5                 # 0.0-2.0 (ignored by Turbo, kept for full model fallback)
    cfg_weight: 0.5                    # 0.0-1.0 (ignored by Turbo, kept for full model fallback)
    preferred_reference: "PTT-20240310-WA0003.wav"  # operator-calibrated clip (41s, 67Hz F0)
    # Turbo ignores exaggeration/cfg_weight — uses its own internal voice matching.
    # Turbo gave better Bajan accent + deeper male voice in operator listening test.
    # Reference: PTT-20240310-WA0003.wav (41s, 67Hz F0 — deepest male clip)
    # Models auto-download from HuggingFace on first use (~2 GB total, cached)
    # On CPU-only VPS: Turbo RTF ~7-8x (faster than full model's ~10-13x).
  # Gemini TTS fallback (preset voices only, no cloning)
  tts:
    model: "gemini-3.1-flash-tts-preview"
    voice: "Kore"
    style: "warm, authoritative, Caribbean-influenced English"
    api_key_env: "GEMINI_API_KEY"
    sample_rate: 24000

# ── Media generation (T11.1: CORRECTION-episode-format-and-reference-assets-v1.0 §5.2) ──
# Config-driven generator inventory. Per-unit costs drive all gate cost estimates.
# Add new generators here — they automatically appear in the LLM's options.
#
# Auth: set the env var for each provider you want active.
# FAL_KEY for fal.ai providers (kling, veo, flux, nano-banana).
# OPENROUTER_API_KEY for legacy Gemini image generation via OpenRouter.
# XAI_API_KEY for legacy Grok video (non-default named backend).
# GOOGLE_API_KEY for legacy Google Veo direct (non-default named backend).
#
# Sora was retired (OpenAI API discontinued 2026-09-24).
media:
  # ── Image generators (reference-conditioned) ──
  image_generators:
    - name: "nano-banana-2"
      provider: "fal"
      endpoint: "fal-ai/gemini-3.1-flash-image-preview"
      api_key_env: "FAL_KEY"
      cost_per_image_usd: 0.039
      supports_reference_images: true
      best_for: "recurring characters, identity-critical shots (up to 5 characters / 14 refs)"
    - name: "flux2-pro"
      provider: "fal"
      endpoint: "fal-ai/flux-2-pro"
      api_key_env: "FAL_KEY"
      cost_per_image_usd: 0.03
      supports_reference_images: true
      best_for: "b-roll and non-character shots, highest photorealism"
  image_default: "nano-banana-2"

  # ── Legacy image generator (OpenRouter — kept as non-default named backend) ──
  image_base_url: "https://openrouter.ai/api/v1"

  # ── Video generators (image-to-video from approved stills) ──
  # New fal providers (default path) + legacy providers (named backends, non-default).
  # The fallback code scans this list for the first generator with its API key set.
  video_generators:
    # ── fal providers (default path — reference-conditioned, image-to-video) ──
    - name: "kling-3"
      provider: "fal"
      endpoint: "fal-ai/kling-video/v3/standard/image-to-video"
      api_key_env: "FAL_KEY"
      cost_per_second_usd: 0.10
      mode: "image_to_video"
      native_audio: false
      best_for: "all standard shots"
    - name: "veo-3.1-fast"
      provider: "fal"
      endpoint: "fal-ai/veo3.1/fast/image-to-video"
      api_key_env: "FAL_KEY"
      cost_per_second_usd: 0.15
      mode: "image_to_video"
      native_audio: false
      best_for: "hook/hero shots"
    # ── Legacy providers (named backends — not default, kept for compatibility) ──
    - name: "grok-imagine-video"
      provider: "xai"
      model: "grok-imagine-video"
      base_url: "https://api.x.ai"
      api_key_env: "XAI_API_KEY"
      best_for: "stylized, conceptual, fast generation"
    - name: "veo"
      provider: "google"
      model: "veo-3.1-fast-generate-preview"
      base_url: "https://generativelanguage.googleapis.com"
      api_key_env: "GOOGLE_API_KEY"
      best_for: "cinematic, photorealistic, long clips"
  video_default: "kling-3"

  # ── Legacy single-generator compat (for code paths not yet updated) ──
  video_provider: "fal"
  video_base_url: "https://fal.run"
  base_url: "https://openrouter.ai/api/v1"

  # ── Music generators (registry beds only — licensed, commercial-safe) ──
  music_generators:
    - name: "eleven-music"
      provider: "elevenlabs"
      api_key_env: "ELEVENLABS_API_KEY"
      best_for: "registry music beds only — licensed training data, clean commercial rights"

  # ── Animation/3D (disabled by default — enable when installed) ──
  animation:
    enabled: false
    tool: "blender"
    best_for: "motion graphics, animated text, 3D sequences"

# ── Asset review (AI viewer) ──────────────────────────────────────────
# Vision-capable model for inspecting rendered videos and generated images.
# The model receives extracted keyframes + the asset content and judges
# whether the output is coherent before the operator reviews it.
# The review is advisory — the operator is always the final gate.
# Set enabled: false to skip AI review (mechanical checks still run).
asset_review:
  vision_model: "google/gemini-3.1-flash-lite"
  vision_provider: "openrouter"
  vision_api_key_env: "OPENROUTER_API_KEY"
  max_keyframes: 5
  enabled: true
  # T10.9 (AMENDMENT-008): Remediation cost guard
  # max_remediation_cost_usd: 2.00   # cumulative cap per asset (UNCOMMENT to enable auto-remediation)
  max_remediation_rounds: 3          # hard cap on render/review rounds

# ── Episode format Layer-2 asset QC (T11.8: CORRECTION-episode-format-and-reference-assets-v1.0 §7.2) ──
# Advisory post-generation checks on returned stills and animation frames.
# Flags are NEVER auto-reject — they render as warnings on storyboard cards
# and enter AMENDMENT-008 review evidence. The operator decides.
episode_qc:
  # Face-embedding identity check
  # Uses a self-hosted insightface-class ONNX model on CPU — NO per-call API cost.
  # If the model file isn't available, the identity check is skipped gracefully.
  identity:
    enabled: true
    # Model path (relative to project root or absolute). If not found, check is skipped.
    model_path: "models/insightface/buffalo_l/w600k_r50.onnx"
    # Minimum cosine similarity between a returned still/frame face embedding
    # and the canonical character_ref embeddings. Below this → qc_flag: identity_drift
    min_cosine_similarity: 0.45
    # Which frames to check from animated clips: first, middle, last
    frame_positions: ["first", "middle", "last"]
    # Minimum face detection confidence (0-1). Faces below this are treated as "no face detected"
    min_face_confidence: 0.5
  # Color-histogram grade check
  # Compares the color distribution of returned stills/frames vs the location plate.
  # Uses PIL + numpy (no OpenCV required). Histogram distance above max → qc_flag: grade_break
  grade:
    enabled: true
    # Histogram distance metric: "correlation" | "chi_square" | "bhattacharyya" | "intersection"
    # "correlation": higher = more similar. Threshold is a minimum.
    # "chi_square" / "bhattacharyya": lower = more similar. Threshold is a maximum.
    histogram_metric: "correlation"
    # Threshold for the histogram distance. Breach → qc_flag: grade_break
    # For correlation: below this value = grade break
    # For chi_square/bhattacharyya: above this value = grade break
    histogram_threshold: 0.30
    # Number of histogram bins per channel (RGB)
    histogram_bins: 32
    # Frame positions to extract from animated clips for grade check
    frame_positions: ["first", "middle", "last"]

# ── Episode format Layer-1 lints (T11.2: CORRECTION-episode-format §7.1) ──
# Deterministic pre-spend checks. A plan that fails any lint cannot trigger
# a paid media call. The banned-token list is config, not code — a second
# business can set different tokens with zero code changes.
episode_lint:
  # Tokens that current image/video models reliably ruin (text, screens, logos).
  # All on-screen text/numbers are renderer-drawn graphics — the mush class
  # is eliminated by construction, not by review.
  banned_prompt_tokens:
    - "text"
    - "words"
    - "sign"
    - "screen"
    - "phone"
    - "logo"
    - "document"
    - "chart"
    - "letters"
    - "numbers on"
  # Duration tolerance: Σ beat VO durations must be within ±10% of format target
  duration_tolerance_pct: 10
  # Hook duration cap (seconds) — hook beat must be ≤ this
  hook_max_duration_s: 3.0

# ── Stock library (Final Assembly Part 1) ──
# Pexels (primary) + Pixabay (secondary). Both free, commercial-safe.
# Auth: PEXELS_API_KEY + PIXABAY_API_KEY env vars.
stock:
  providers:
    - "pexels"
    - "pixabay"
  music_source: "pixabay"      # Pixabay's audio catalog for background tracks
  cache_dir: "data/media/stock"

