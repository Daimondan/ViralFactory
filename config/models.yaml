# ViralFactory models config
# LLM backend configuration. Swap = config edit, zero code change.
#
# Users can define as many named backends as they want below.
# Each backend has: provider, model, temperature, max_tokens, base_url.
# Reference any backend by name in playbooks or code: adapter.complete(..., backend="glm_5_2")
#
# The active processing/drafting backends are set in the "active" block.
# The drafter backend is chosen by blind A/B at the M3 checkpoint.

# ── Active backend selection ──────────────────────────────────────────
# Change these to switch which named backend is used for processing vs drafting.
active:
  default: "ollama_glm52"       # processing steps (temperature 0)
  drafter: "ollama_glm52_creative"  # content drafting (generative — real temperature)
  ideator: "ollama_glm52_creative"  # idea generation (generative — real temperature)
  converse: "ollama_gpt_oss_120b"  # P2-1: fast non-reasoning backend for conversational turns
  drafter_ab_candidate: null    # set to a backend name for M3 A/B test

# ── Named backends ────────────────────────────────────────────────────
# Add as many as you need. provider drives the API format:
#   ollama_cloud / ollama_local → Ollama API (/api/chat)
#   openai                      → OpenAI-compatible (/v1/chat/completions)
# Set the matching env var for auth: OLLAMA_API_KEY, OPENAI_API_KEY, etc.

ollama_glm52:
  provider: "ollama_cloud"
  model: "glm-5.2"
  temperature: 0
  max_tokens: 8192              # GLM-5.2 is a reasoning model — needs headroom
  base_url: "https://ollama.com"

# Generative backend for idea generation + drafting (real temperature per
# CORRECTION-generation-diversity-and-asset-continuity S1a). The temp-0 guardrail
# correctly covers judgment/extraction only; generative calls need variance.
ollama_glm52_creative:
  provider: "ollama_cloud"
  model: "glm-5.2"
  temperature: 0.9
  max_tokens: 8192
  base_url: "https://ollama.com"

ollama_gpt_oss_120b:
  provider: "ollama_cloud"
  model: "gpt-oss:120b"
  temperature: 0
  max_tokens: 4096
  base_url: "https://ollama.com"

ollama_kimi_k26:
  provider: "ollama_cloud"
  model: "kimi-k2.6"
  temperature: 0
  max_tokens: 8192
  base_url: "https://ollama.com"

# Example: OpenAI-compatible backend (uncomment + set OPENAI_API_KEY env)
# openai_gpt4o:
#   provider: "openai"
#   model: "gpt-4o"
#   temperature: 0
#   max_tokens: 4096
#   base_url: "https://api.openai.com"

# ── Transcription (R6 fix per DIVERGENCE-003) ───────────────────────
# faster-whisper for speech-to-text. Runs on CPU (int8 quantization).
# Audio files uploaded during intake are transcribed automatically.
# Per DECISION-transcription-whisper-v1.0.md: medium model, CPU int8.
transcription:
  enabled: true
  model: "medium"          # tiny | base | small | medium | large-v3 (RAM scales)
  compute_type: "int8"   # CPU-only VPS; float16 if GPU available
  language: "en"         # "auto" for auto-detect

# ── Voice cloning (DIVERGENCE-003) ──────────────────────────────────
# Open-source TTS with zero-shot voice cloning. Apache 2.0 licensed
# (commercially safe for paying customers). NOT XTTS-v2 (CPML = non-commercial).
# Reference audio stored per-business in modules/{business}/voice-samples/.
voice_cloning:
  engine: "qwen3_tts"                      # qwen3_tts | moss_tts | voxflash_tts
  model: "Qwen3-TTS-12Hz-1.7B-VoiceDesign"  # Apache 2.0, 3-second cloning
  reference_audio_dir: "modules/{business}/voice-samples/"
  sample_rate: 24000

# ── Media generation (F4: CORRECTION-pipeline-ux-and-media-generation-v1.0) ──
# OpenRouter Image + Video APIs. Swap = config edit, zero code change.
# Auth: OPENROUTER_API_KEY env var (single bearer token for both image + video).
media:
  image_default: "google/gemini-3.1-flash-image"
  video_default: "google/veo-3.1-lite"
  base_url: "https://openrouter.ai/api/v1"

# ── Stock library (Final Assembly Part 1) ──
# Pexels (primary) + Pixabay (secondary). Both free, commercial-safe.
# Auth: PEXELS_API_KEY + PIXABAY_API_KEY env vars.
stock:
  providers:
    - "pexels"
    - "pixabay"
  music_source: "pixabay"      # Pixabay's audio catalog for background tracks
  cache_dir: "data/media/stock"

# ── Postiz (M4: publish + metrics) ──
# Self-hosted Postiz instance for publishing to social platforms + pulling analytics.
# Auth: POSTIZ_API_KEY env var. base_url points to the Postiz API.
# integration_ids map platform names to Postiz integration IDs (or leave blank to
# auto-discover via GET /integrations).
postiz:
  base_url: "http://localhost:3000/api/public/v1"
  api_key: ""                              # from POSTIZ_API_KEY env var
  default_integration_ids:
    X: ""
    Instagram: ""