<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library — ViralFactory</title>
    <style>
        :root {
            --bg: #0d1117; --surface: #161b22; --border: #30363d;
            --text: #e6edf3; --muted: #8b949e; --accent: #2f81f7;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text); line-height: 1.6;
            padding: 2rem; max-width: 1200px; margin: 0 auto;
        }
        h1 { color: var(--accent); margin-bottom: 1rem; }
        .nav { display: flex; gap: 1.5rem; margin-bottom: 2rem; }
        .nav a { color: var(--muted); text-decoration: none; }
        .nav a.active { color: var(--text); font-weight: 600; }
        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 1.2rem; margin-bottom: 1rem;
        }
        .muted { color: var(--muted); }
    </style>
</head>
<body>
    <h1>Library</h1>
    <div class="nav">
        <a href="/">Home</a>
        <a href="/onboard">Onboard</a>
        <a href="/library" class="active">Library</a>
    </div>

    <div class="card">
        <p class="muted">Module browser — available after onboarding completes (M2+).</p>
    </div>

    <p class="muted">The 8 living modules will appear here once built:
    Voice Profile · Viral Patterns · Story Frameworks · Format Guide ·
    Audience Insights · Feedback Log · Visual Style · Source Bank.</p>
</body>
</html>
