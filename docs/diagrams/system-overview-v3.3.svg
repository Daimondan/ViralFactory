<svg viewBox="0 0 1160 1350" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#555"/>
    </marker>
    <marker id="arL" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#2e7d5b"/>
    </marker>
    <marker id="arO" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#c0663a"/>
    </marker>
    <marker id="arP" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#5b4aa5"/>
    </marker>
  </defs>

  <text x="580" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#1f1f1f">ViralFactory — System Overview · Charter v3.3</text>
  <text x="580" y="58" text-anchor="middle" font-size="12.5" fill="#666">staged pipeline (A-003) · treatment on cards + format debut + awaiting-capture (A-004) · standalone, own DB (D-002) · async gates (D-001)</text>

  <!-- THE PERSON -->
  <rect x="120" y="84" width="330" height="72" rx="10" fill="#fdeee4" stroke="#c0663a" stroke-width="2"/>
  <text x="285" y="112" text-anchor="middle" font-size="15" font-weight="bold" fill="#7a3a1a">THE PERSON</text>
  <text x="285" y="132" text-anchor="middle" font-size="11" fill="#444">materials · seeds · reactions · direct edits · capture · lived domain</text>

  <!-- ONBOARDING -->
  <rect x="640" y="84" width="330" height="72" rx="10" fill="#eeeafb" stroke="#5b4aa5" stroke-width="2"/>
  <text x="805" y="112" text-anchor="middle" font-size="15" font-weight="bold" fill="#3a2b6f">ONBOARDING ENGINE</text>
  <text x="805" y="132" text-anchor="middle" font-size="11" fill="#444">generic playbook runner · 8 playbooks · console-only</text>
  <line x1="450" y1="120" x2="640" y2="120" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- MODULES -->
  <rect x="640" y="196" width="330" height="86" rx="10" fill="#eeeafb" stroke="#5b4aa5" stroke-width="2"/>
  <text x="805" y="222" text-anchor="middle" font-size="14" font-weight="bold" fill="#3a2b6f">8 LIVING MODULES</text>
  <text x="805" y="241" text-anchor="middle" font-size="10.5" fill="#444">Voice · Viral · Story · Format · Audience · Feedback · Visual · Sources</text>
  <text x="805" y="258" text-anchor="middle" font-size="10.5" fill="#444">versioned · gate-token writes only · schema-checked · own DB</text>
  <text x="805" y="274" text-anchor="middle" font-size="10" fill="#8f2b2b" font-weight="bold">no OB1 dependency · formats: experimental → proven / retired</text>
  <line x1="805" y1="156" x2="805" y2="196" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- GATHER -->
  <rect x="120" y="196" width="330" height="64" rx="10" fill="#f4f4f4" stroke="#8a8a8a" stroke-width="1.5"/>
  <text x="285" y="221" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#333">GATHER — automated</text>
  <text x="285" y="240" text-anchor="middle" font-size="10.5" fill="#555">Sources Engine ingests + scores vs Source Criteria</text>
  <line x1="285" y1="156" x2="285" y2="196" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- IDEAS -->
  <rect x="120" y="300" width="330" height="104" rx="10" fill="#ffffff" stroke="#2f2f2f" stroke-width="2"/>
  <text x="285" y="324" text-anchor="middle" font-size="14.5" font-weight="bold">IDEAS — cards, 3 origins</text>
  <text x="285" y="342" text-anchor="middle" font-size="10.5" fill="#444">ai-originated · human-seeded · human-seeded-ai-developed</text>
  <text x="285" y="358" text-anchor="middle" font-size="10.5" fill="#444">card = idea + hooks + TREATMENT + origin + evidence</text>
  <text x="285" y="374" text-anchor="middle" font-size="10.5" fill="#444">treatment: scope (one-off | series-of-N | pillar) · format · capture</text>
  <text x="285" y="392" text-anchor="middle" font-size="10" fill="#7a3a1a" font-weight="bold">person's seeds = primary path · treatment editable at gate</text>
  <line x1="285" y1="260" x2="285" y2="300" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>
  <!-- person's seed side arrow -->
  <path d="M 120 120 L 60 120 L 60 340 L 120 340" fill="none" stroke="#c0663a" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arO)"/>
  <text x="52" y="235" font-size="10" fill="#c0663a" transform="rotate(-90 52 235)" font-weight="bold">raw + AI-developed seeds</text>

  <!-- GATE 1 -->
  <rect x="150" y="422" width="270" height="46" rx="23" fill="#fdeaea" stroke="#b03a3a" stroke-width="2"/>
  <text x="285" y="440" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#8f2b2b">GATE 1 · RIGOROUS — idea + treatment together</text>
  <text x="285" y="457" text-anchor="middle" font-size="10" fill="#8f2b2b">approve / kill / park · new formats may debut</text>
  <line x1="285" y1="404" x2="285" y2="422" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- experimental format debut → Format Guide -->
  <path d="M 420 428 C 560 398 640 328 688 286" fill="none" stroke="#5b4aa5" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arP)"/>
  <text x="632" y="372" text-anchor="middle" font-size="9" fill="#5b4aa5" font-weight="bold">experimental format debuts in treatment —</text>
  <text x="632" y="383" text-anchor="middle" font-size="9" fill="#5b4aa5">Gate-1 approval writes it to Format Guide</text>

  <!-- AWAITING-CAPTURE -->
  <rect x="120" y="492" width="330" height="72" rx="10" fill="#fdf6ee" stroke="#b06a3a" stroke-width="1.8" stroke-dasharray="7,4"/>
  <text x="285" y="514" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#8f4f2b">AWAITING-CAPTURE — only if treatment requires it</text>
  <text x="285" y="532" text-anchor="middle" font-size="10" fill="#555">person films / records · uploads via materials intake · audio transcribed</text>
  <text x="285" y="548" text-anchor="middle" font-size="10" fill="#555">capture_required = none → flows straight through</text>
  <line x1="285" y1="468" x2="285" y2="492" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>
  <!-- capture loop to person -->
  <path d="M 120 148 L 90 160 L 90 545 L 120 550" fill="none" stroke="#c0663a" stroke-width="1.5" stroke-dasharray="6,4" marker-start="url(#arO)" marker-end="url(#arO)"/>
  <text x="82" y="470" font-size="9.5" fill="#c0663a" font-weight="bold" transform="rotate(-90 82 470)">capture loop: tasks to person ↑ · footage / voice back ↓</text>

  <!-- DRAFT -->
  <rect x="120" y="596" width="330" height="96" rx="10" fill="#ffffff" stroke="#2f2f2f" stroke-width="2"/>
  <text x="285" y="620" text-anchor="middle" font-size="14.5" font-weight="bold">DRAFT — ONE master script</text>
  <text x="285" y="639" text-anchor="middle" font-size="10.5" fill="#444">full text in voice, in the treatment's format + LIGHT VISUAL DIRECTION</text>
  <text x="285" y="655" text-anchor="middle" font-size="10.5" fill="#444">(image prompts, refs — NO renders · fan-out comes AFTER human pass)</text>
  <text x="285" y="673" text-anchor="middle" font-size="10" fill="#666">all modules loaded · self-audit vs Tells Checklist</text>
  <line x1="285" y1="564" x2="285" y2="596" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>
  <line x1="700" y1="282" x2="450" y2="630" stroke="#5b4aa5" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arP)"/>
  <text x="600" y="470" font-size="10" fill="#5b4aa5" font-weight="bold">loaded into every draft</text>

  <!-- Modules configure Gather -->
  <line x1="640" y1="216" x2="450" y2="224" stroke="#5b4aa5" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arP)"/>
  <text x="545" y="192" text-anchor="middle" font-size="9.5" fill="#5b4aa5" font-weight="bold">Source Criteria + sources.yaml</text>
  <text x="545" y="204" text-anchor="middle" font-size="9.5" fill="#5b4aa5">onboarding inputs dictate what AI scouts</text>

  <!-- Modules ground idea generation + treatment -->
  <line x1="655" y1="282" x2="450" y2="322" stroke="#5b4aa5" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arP)"/>
  <text x="560" y="308" text-anchor="middle" font-size="9.5" fill="#5b4aa5" font-weight="bold">modules ground ideas + treatments</text>
  <text x="560" y="320" text-anchor="middle" font-size="9.5" fill="#5b4aa5">(Viral · Audience · Story · Format)</text>

  <!-- GATE 2 -->
  <rect x="150" y="710" width="270" height="46" rx="23" fill="#fdeaea" stroke="#b03a3a" stroke-width="2"/>
  <text x="285" y="728" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#8f2b2b">GATE 2 · HUMAN PASS — deep, once, on the master</text>
  <text x="285" y="745" text-anchor="middle" font-size="10" fill="#8f2b2b">chips + text + direct edits (authoritative) → ship / kill</text>
  <line x1="285" y1="692" x2="285" y2="710" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- ASSETS -->
  <rect x="120" y="786" width="330" height="84" rx="10" fill="#ffffff" stroke="#2f2f2f" stroke-width="2"/>
  <text x="285" y="810" text-anchor="middle" font-size="14.5" font-weight="bold">ASSETS — survivors only</text>
  <text x="285" y="829" text-anchor="middle" font-size="10.5" fill="#444">real images per Visual Style Guide + shot library · captions in voice</text>
  <text x="285" y="846" text-anchor="middle" font-size="10.5" fill="#444">fan-out per platform per Format Guide: X thread · IG carousel / reel …</text>
  <line x1="285" y1="756" x2="285" y2="786" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- Modules shape Assets (NEW in v3.3) -->
  <path d="M 945 282 C 1005 370 1005 690 950 765 C 875 850 615 825 452 815" fill="none" stroke="#5b4aa5" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arP)"/>
  <text x="1013" y="640" font-size="10" fill="#5b4aa5" font-weight="bold" transform="rotate(-90 1013 640)">Visual Style · Format Guide · Voice shape renders &amp; fan-out</text>

  <!-- GATE 3 -->
  <rect x="150" y="888" width="270" height="46" rx="23" fill="#fdf2ea" stroke="#b06a3a" stroke-width="2"/>
  <text x="285" y="907" text-anchor="middle" font-size="12" font-weight="bold" fill="#8f4f2b">GATE 3 · QUICK, PER PLATFORM</text>
  <text x="285" y="924" text-anchor="middle" font-size="10.5" fill="#8f4f2b">approve / fix / kill — variants side by side</text>
  <line x1="285" y1="870" x2="285" y2="888" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- GATE 4 -->
  <rect x="150" y="952" width="270" height="46" rx="23" fill="#eafbea" stroke="#3a8a3a" stroke-width="2"/>
  <text x="285" y="971" text-anchor="middle" font-size="12" font-weight="bold" fill="#2b6f2b">GATE 4 · PUBLISH — go / hold</text>
  <text x="285" y="988" text-anchor="middle" font-size="10.5" fill="#2b6f2b">NO AUTO-PUBLISH, EVER — HARD RULE</text>
  <line x1="285" y1="934" x2="285" y2="952" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- POSTIZ -->
  <rect x="120" y="1016" width="330" height="60" rx="10" fill="#f4f4f4" stroke="#8a8a8a" stroke-width="1.5"/>
  <text x="285" y="1040" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#333">SHIP → POSTIZ (self-hosted, VPS)</text>
  <text x="285" y="1058" text-anchor="middle" font-size="10.5" fill="#555">accounts in Postiz · schedule (series cadence dates land here) · post · metrics</text>
  <line x1="285" y1="998" x2="285" y2="1016" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- LEARN: inward -->
  <rect x="120" y="1120" width="330" height="84" rx="10" fill="#e8f6ef" stroke="#2e7d5b" stroke-width="2"/>
  <text x="285" y="1144" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#1d5a40">INWARD LOOP — weekly</text>
  <text x="285" y="1163" text-anchor="middle" font-size="10.5" fill="#444">nightly note carries origin · format · scope per piece</text>
  <text x="285" y="1180" text-anchor="middle" font-size="10.5" fill="#444">Feedback Log (direct edits highest) · formats graduate proven / retire</text>
  <line x1="285" y1="1076" x2="285" y2="1120" stroke="#555" stroke-width="1.5" marker-end="url(#ar)"/>

  <!-- LEARN: outward -->
  <rect x="640" y="1120" width="330" height="84" rx="10" fill="#e8f6ef" stroke="#2e7d5b" stroke-width="2"/>
  <text x="805" y="1144" text-anchor="middle" font-size="13.5" font-weight="bold" fill="#1d5a40">OUTWARD LOOP — always on</text>
  <text x="805" y="1163" text-anchor="middle" font-size="10.5" fill="#444">researches viral content — decomposes format mechanics:</text>
  <text x="805" y="1180" text-anchor="middle" font-size="10.5" fill="#444">what works, how, for what messaging &amp; audience → proposals</text>

  <!-- ASYNC GATE QUEUE -->
  <rect x="380" y="1250" width="400" height="72" rx="10" fill="#fdeaea" stroke="#b03a3a" stroke-width="2"/>
  <text x="580" y="1276" text-anchor="middle" font-size="14" font-weight="bold" fill="#8f2b2b">ASYNC GATE QUEUE</text>
  <text x="580" y="1295" text-anchor="middle" font-size="10.5" fill="#444">person clears when ready · age visible · superseding · no pressure</text>
  <text x="580" y="1311" text-anchor="middle" font-size="10.5" fill="#444">approve = module version bump with provenance</text>

  <line x1="285" y1="1204" x2="470" y2="1250" stroke="#2e7d5b" stroke-width="1.5" marker-end="url(#arL)"/>
  <line x1="805" y1="1204" x2="690" y2="1250" stroke="#2e7d5b" stroke-width="1.5" marker-end="url(#arL)"/>

  <!-- queue back to modules -->
  <path d="M 780 1286 L 1080 1286 L 1080 239 L 970 239" fill="none" stroke="#2e7d5b" stroke-width="1.8" stroke-dasharray="7,5" marker-end="url(#arL)"/>
  <text x="1093" y="760" font-size="10.5" fill="#2e7d5b" font-weight="bold" transform="rotate(-90 1093 760)">approved proposals bump modules → next draft inherits</text>

  <!-- experiments queue back to ideas -->
  <path d="M 640 1162 L 520 1162 L 520 352 L 450 352" fill="none" stroke="#2e7d5b" stroke-width="1.5" stroke-dasharray="3,4" marker-end="url(#arL)"/>
  <text x="533" y="760" font-size="10" fill="#2e7d5b" transform="rotate(-90 533 760)">approved experiments &amp; debut-format proposals enter as idea cards</text>

  <!-- kill reasons note -->
  <path d="M 415 452 C 505 452 505 1140 450 1148" fill="none" stroke="#b03a3a" stroke-width="1" stroke-dasharray="2,4" marker-end="url(#ar)"/>
  <text x="470" y="800" font-size="9.5" fill="#b03a3a" transform="rotate(-90 470 800)">kill reasons (gates 1–3) → Feedback Log → inward loop</text>
</svg>
